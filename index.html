<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブリンカー装着馬チェッカー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-info: #E6F1FB;
    --bg-success: #EAF3DE;
    --bg-danger: #FCEBEB;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #999;
    --text-info: #0C447C;
    --text-success: #3B6D11;
    --text-danger: #A32D2D;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --border-info: #85B7EB;
    --border-success: #97C459;
    --radius-md: 8px;
    --radius-lg: 12px;
    --accent: #185FA5;
    --accent-hover: #0C447C;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-info: #042C53;
      --bg-success: #173404;
      --bg-danger: #3a1010;
      --text: #e8e8e8;
      --text-secondary: #aaa;
      --text-tertiary: #666;
      --text-info: #85B7EB;
      --text-success: #97C459;
      --text-danger: #F09595;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
      --border-info: #185FA5;
      --border-success: #3B6D11;
      --accent: #378ADD;
      --accent-hover: #85B7EB;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 960px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .title { font-size: 24px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--text-secondary); }

  .controls {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .controls label { font-size: 14px; color: var(--text-secondary); }

  input[type="date"] {
    height: 36px;
    padding: 0 12px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  input[type="date"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
  }

  .btn {
    height: 36px;
    padding: 0 16px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .saved-at { font-size: 12px; color: var(--text-tertiary); margin-bottom: 1rem; text-align: right; }

  /* メトリクス */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1rem;
  }
  .metric {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 500; color: var(--text); }
  .metric-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

  /* 回収率カード */
  .recovery-section {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .recovery-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }
  .recovery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .recovery-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
  }
  .recovery-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .recovery-value {
    font-size: 32px;
    font-weight: 500;
    color: var(--text);
  }
  .recovery-value.good { color: var(--text-success); }
  .recovery-value.bad { color: var(--text-danger); }
  .recovery-detail {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  /* 会場セクション */
  .venue-section {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .venue-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    font-size: 18px;
    font-weight: 500;
  }
  .venue-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: var(--radius-md);
    background: var(--bg-info);
    color: var(--text-info);
    font-weight: 400;
  }

  .race-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
    gap: 8px;
  }

  .race-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    background: var(--bg-secondary);
    min-height: 64px;
  }
  .race-card.has-horse { border-color: var(--border-info); background: var(--bg); }
  .race-card.has-hit { border-color: var(--border-success); }

  .race-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }

  .horse-block { margin-bottom: 4px; }

  .horse-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
  }

  .horse-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg-info);
    color: var(--text-info);
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .horse-name { font-size: 13px; color: var(--text); line-height: 1.3; flex: 1; }

  .result-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .rank-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: var(--radius-md);
    font-weight: 500;
  }
  .rank-hit { background: var(--bg-success); color: var(--text-success); }
  .rank-miss { background: var(--bg-secondary); color: var(--text-tertiary); border: 0.5px solid var(--border); }
  .rank-pending { background: var(--bg-info); color: var(--text-info); }

  .fukusho-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: var(--radius-md);
    background: #FAEEDA;
    color: #633806;
    font-weight: 500;
  }
  .tansho-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: var(--radius-md);
    background: #F0E6FB;
    color: #4A1580;
    font-weight: 500;
  }
  @media (prefers-color-scheme: dark) {
    .fukusho-badge { background: #412402; color: #FAC775; }
    .tansho-badge { background: #2A0D47; color: #C89BF5; }
  }

  .divider { height: 0.5px; background: var(--border); margin: 6px 0; }
  .no-horse { font-size: 12px; color: var(--text-tertiary); }

  .status-msg {
    font-size: 14px;
    color: var(--text-secondary);
    padding: 3rem;
    text-align: center;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .error-msg {
    font-size: 14px;
    color: var(--text-danger);
    padding: 1rem 1.25rem;
    background: var(--bg-danger);
    border-radius: var(--radius-md);
  }

  @media (max-width: 480px) {
    .race-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .title { font-size: 20px; }
    .recovery-grid { grid-template-columns: 1fr 1fr; }
    .recovery-value { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="title">ブリンカー装着馬チェッカー</div>
    <div class="subtitle">赤Bマークの馬を競馬場・レースごとに一覧表示</div>
  </div>

  <div class="controls">
    <label for="dateInput">開催日</label>
    <input type="date" id="dateInput">
    <button class="btn btn-primary" onclick="loadData()">データ取得</button>
    <button class="btn" onclick="loadToday()">今日</button>
  </div>

  <div id="savedAt" class="saved-at"></div>
  <div id="metrics" class="metrics" style="display:none"></div>
  <div id="recovery" style="display:none"></div>
  <div id="content"><div class="status-msg">日付を選んでデータを取得してください</div></div>

</div>
<script>
const API = "https://blinker-api-production.up.railway.app";

function todayJST() {
  const d = new Date();
  const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  return jst.toISOString().slice(0, 10);
}

function setDefaultDate() {
  document.getElementById("dateInput").value = todayJST();
}

function loadToday() {
  setDefaultDate();
  loadData();
}

async function loadData() {
  const val = document.getElementById("dateInput").value;
  if (!val) return;
  const dateStr = val.replace(/-/g, "");

  document.getElementById("content").innerHTML = '<div class="status-msg">データを取得中...</div>';
  document.getElementById("metrics").style.display = "none";
  document.getElementById("recovery").style.display = "none";
  document.getElementById("savedAt").textContent = "";

  try {
    const res = await fetch(`${API}/scrape/all?date=${dateStr}`);
    const json = await res.json();
    if (json.error) {
      document.getElementById("content").innerHTML = `<div class="error-msg">${json.error}</div>`;
      return;
    }
    renderData(json);
  } catch(e) {
    document.getElementById("content").innerHTML = '<div class="error-msg">APIに接続できませんでした。しばらく待ってから再試行してください。</div>';
  }
}

// 払戻文字列→数値変換 ("1,200円" → 1200)
function parseAmount(str) {
  if (!str) return 0;
  return parseInt(str.replace(/[^\d]/g, "")) || 0;
}

function renderData(json) {
  const results = json.results || {};
  const savedAt = json.saved_at;

  if (savedAt) {
    const dt = new Date(savedAt);
    document.getElementById("savedAt").textContent = "最終更新: " + dt.toLocaleString("ja-JP");
  }

  const venues = Object.keys(results);

  // 統計計算
  let totalHorses = 0, totalRaces = 0, totalHit = 0;
  let tanshoInvest = 0, tanshoReturn = 0;
  let fukushoInvest = 0, fukushoReturn = 0;

  venues.forEach(v => {
    Object.values(results[v]).forEach(horses => {
      if (!Array.isArray(horses) || horses.length === 0) return;
      totalRaces++;
      horses.forEach(h => {
        totalHorses++;
        if (!h.has_result) return;

        const umaNum = String(h.馬番);

        // 単勝回収率計算
        if (Array.isArray(h.tansho) && h.tansho.length > 0) {
          tanshoInvest += 100;
          const t = h.tansho.find(x => String(x.馬番) === umaNum);
          if (t && t.払戻) tanshoReturn += parseAmount(t.払戻);
        }

        // 複勝回収率計算
        if (Array.isArray(h.fukusho) && h.fukusho.length > 0) {
          fukushoInvest += 100;
          const f = h.fukusho.find(x => String(x.馬番) === umaNum);
          if (f && f.払戻) fukushoReturn += parseAmount(f.払戻);
        }

        if (h.着順 && h.着順 !== "-") totalHit++;
      });
    });
  });

  // メトリクス表示
  const metrics = document.getElementById("metrics");
  metrics.innerHTML = `
    <div class="metric">
      <div class="metric-label">開催場数</div>
      <div class="metric-value">${venues.length}</div>
      <div class="metric-sub">競馬場</div>
    </div>
    <div class="metric">
      <div class="metric-label">Bマーク馬</div>
      <div class="metric-value">${totalHorses}</div>
      <div class="metric-sub">頭</div>
    </div>
    <div class="metric">
      <div class="metric-label">3着以内</div>
      <div class="metric-value">${totalHit}</div>
      <div class="metric-sub">${totalHorses > 0 ? Math.round(totalHit / totalHorses * 100) + "%" : "-"}</div>
    </div>
    <div class="metric">
      <div class="metric-label">該当レース</div>
      <div class="metric-value">${totalRaces}</div>
      <div class="metric-sub">レース</div>
    </div>
  `;
  metrics.style.display = "grid";

  // 回収率表示
  const tanshoRate = tanshoInvest > 0 ? Math.round(tanshoReturn / tanshoInvest * 100) : 0;
  const fukushoRate = fukushoInvest > 0 ? Math.round(fukushoReturn / fukushoInvest * 100) : 0;

  const recovery = document.getElementById("recovery");
  recovery.innerHTML = `
    <div class="recovery-section">
      <div class="recovery-title">📊 回収率（結果が出たレースのみ）</div>
      <div class="recovery-grid">
        <div class="recovery-card">
          <div class="recovery-label">単勝回収率</div>
          <div class="recovery-value ${tanshoRate >= 100 ? "good" : "bad"}">${tanshoRate}%</div>
          <div class="recovery-detail">投資 ${tanshoInvest.toLocaleString()}円 / 回収 ${tanshoReturn.toLocaleString()}円</div>
        </div>
        <div class="recovery-card">
          <div class="recovery-label">複勝回収率</div>
          <div class="recovery-value ${fukushoRate >= 100 ? "good" : "bad"}">${fukushoRate}%</div>
          <div class="recovery-detail">投資 ${fukushoInvest.toLocaleString()}円 / 回収 ${fukushoReturn.toLocaleString()}円</div>
        </div>
      </div>
    </div>
  `;
  recovery.style.display = "block";

  if (venues.length === 0) {
    document.getElementById("content").innerHTML = '<div class="status-msg">この日のデータはありません</div>';
    return;
  }

  // 会場・レース表示
  let html = "";
  for (const [venue, races] of Object.entries(results)) {
    const count = Object.values(races).filter(h => Array.isArray(h) && h.length > 0).reduce((s, h) => s + h.length, 0);
    html += `<div class="venue-section">
      <div class="venue-header">${venue}<span class="venue-badge">Bマーク ${count}頭</span></div>
      <div class="race-grid">`;

    for (const [race, horses] of Object.entries(races)) {
      const hasHorse = Array.isArray(horses) && horses.length > 0;
      const hasHit = hasHorse && horses.some(h => h.着順 && h.着順 !== "-");

      html += `<div class="race-card ${hasHorse ? "has-horse" : ""} ${hasHit ? "has-hit" : ""}">
        <div class="race-label">${race}</div>`;

      if (hasHorse) {
        horses.forEach((h, idx) => {
          if (idx > 0) html += `<div class="divider"></div>`;
          const umaNum = String(h.馬番);

          html += `<div class="horse-block">
            <div class="horse-row">
              <div class="horse-num">${h.馬番}</div>
              <div class="horse-name">${h.馬名}</div>
            </div>`;

          if (h.has_result === true) {
            const isHit = h.着順 && h.着順 !== "-";
            html += `<div class="result-row">`;

            if (isHit) {
              html += `<span class="rank-badge rank-hit">${h.着順}着</span>`;

              // 複勝払戻
              if (Array.isArray(h.fukusho)) {
                const f = h.fukusho.find(x => String(x.馬番) === umaNum);
                if (f && f.払戻) html += `<span class="fukusho-badge">複勝 ${f.払戻}</span>`;
              }

              // 単勝払戻（1着のみ）
              if (h.着順 === "1" && Array.isArray(h.tansho)) {
                const t = h.tansho.find(x => String(x.馬番) === umaNum);
                if (t && t.払戻) html += `<span class="tansho-badge">単勝 ${t.払戻}</span>`;
              }
            } else {
              html += `<span class="rank-badge rank-miss">圏外</span>`;
            }
            html += `</div>`;
          } else if (h.has_result === false) {
            html += `<div class="result-row"><span class="rank-badge rank-pending">発走前</span></div>`;
          }

          html += `</div>`;
        });
      } else {
        html += `<div class="no-horse">なし</div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }

  document.getElementById("content").innerHTML = html;
}

setDefaultDate();
</script>
</body>
</html>
